services:
  - type: web
    name: portal-vila-api
    runtime: docker
    plan: starter
    dockerfilePath: ./portal-vila-api/Dockerfile
    dockerContext: ./portal-vila-api
    healthCheckPath: /api/residents/registration-houses
    envVars:
      - key: PORT
        value: "8080"
      - key: PORTAL_SEED_ENABLED
        value: "true"
      - key: PORTAL_ADMIN_EMAIL
        value: ubaldinajacare207@gmail.com
      - key: PORTAL_ADMIN_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION_MINUTES
        value: "480"
      - key: MAIL_HOST
        sync: false
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: ASAAS_BASE_URL
        value: https://api-sandbox.asaas.com/v3
      - key: ASAAS_API_KEY
        sync: false
      - key: ASAAS_WEBHOOK_TOKEN
        sync: false
      - key: ASAAS_USER_AGENT
        value: Portal da Vila
      - key: PORTAL_UPLOAD_DIR
        value: /data/uploads
      - key: DATABASE_URL
        fromDatabase:
          name: portal-vila-db
          property: connectionString
    disk:
      name: portal-vila-documents
      mountPath: /data
      sizeGB: 1

  - type: web
    name: portal-vila-app
    runtime: static
    buildCommand: cd portal-vila-app && npm ci && npm run build:web
    staticPublishPath: portal-vila-app/dist
    envVars:
      - key: EXPO_PUBLIC_API_URL
        value: https://portal-vila-api.onrender.com/api
    routes:
      - type: rewrite
        source: "/*"
        destination: /index.html

databases:
  - name: portal-vila-db
    plan: basic-256mb
    databaseName: portal_vila
    user: portal_vila
    postgresMajorVersion: "17"
