services:
  postgres:
    image: postgres:16-alpine
    container_name: portal-vila-postgres
    environment:
      POSTGRES_DB: portal_vila
      POSTGRES_USER: portal_vila
      POSTGRES_PASSWORD: portal_vila
    ports:
      - "55433:5432"
    volumes:
      - portal-vila-postgres:/var/lib/postgresql/data

volumes:
  portal-vila-postgres:
