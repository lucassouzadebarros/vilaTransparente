server:
  port: ${PORT:8080}

spring:
  application:
    name: portal-vila-api
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/portal_vila}
    username: ${DATABASE_USERNAME:portal_vila}
    password: ${DATABASE_PASSWORD:portal_vila}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:true}

portal:
  seed:
    enabled: ${PORTAL_SEED_ENABLED:true}
  admin:
    email: ${PORTAL_ADMIN_EMAIL:admin@vila.com}
    password: ${PORTAL_ADMIN_PASSWORD:123456}
  jwt:
    secret: ${JWT_SECRET:portal-vila-dev-secret-with-32-chars-minimum}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:480}
  password-reset:
    debug: ${PORTAL_PASSWORD_RESET_DEBUG:false}
    expiration-minutes: ${PORTAL_PASSWORD_RESET_EXPIRATION_MINUTES:15}
  mail:
    from: ${MAIL_FROM:${MAIL_USERNAME:}}
  asaas:
    base-url: ${ASAAS_BASE_URL:https://api-sandbox.asaas.com/v3}
    api-key: ${ASAAS_API_KEY:}
    webhook-token: ${ASAAS_WEBHOOK_TOKEN:dev-webhook-token}
    user-agent: ${ASAAS_USER_AGENT:Portal da Vila}
  uploads:
    dir: ${PORTAL_UPLOAD_DIR:uploads/documents}
